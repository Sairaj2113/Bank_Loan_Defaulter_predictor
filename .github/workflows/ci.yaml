name: Bank Loan Predictor CI

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:
test:

```
runs-on: ubuntu-latest

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Upgrade pip
    run: |
      python -m pip install --upgrade pip

  - name: Install Project Dependencies
    run: |
      pip install -r requirements.txt

  - name: Verify DATABASE_URL Exists
    run: |
      python -c "import os; print('DATABASE_URL exists:', bool(os.getenv('DATABASE_URL')))"

  - name: Verify Backend Syntax
    run: |
      python -m py_compile backend/app/main.py

  - name: Verify Frontend Syntax
    run: |
      python -m py_compile frontend/dashboard.py

  - name: Run Smoke Tests
    run: |
      python -m unittest discover -s tests -p "test_*.py"

  - name: Build Docker Image
    run: |
      docker build -t loan-backend .
```
