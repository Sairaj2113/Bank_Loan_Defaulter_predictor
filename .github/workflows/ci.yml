name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: loan_risk_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: abc123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d loan_risk_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:abc123@localhost:5432/loan_risk_db
      BACKEND_URL: http://localhost:8000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt

      - name: Create database schema
        run: |
          python -c "from backend.app.database.models import Base; from backend.app.database.database import engine; Base.metadata.create_all(bind=engine)"

      - name: Run smoke tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t loan-risk-backend .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t loan-risk-frontend .
